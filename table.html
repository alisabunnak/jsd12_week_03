<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Table</title>

  <style>
    table {
      width: 100%;
      table-layout: fixed;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid #555;
      text-align: center;
      vertical-align: middle;
      padding: 10px;
    }

    th {
      background-color: #f2f2f2;
    }

    tfoot td {
      font-weight: bold;
      padding: 15px;
    }
  </style>
</head>

<body>
  <table border="2">
    <thead>
      <tr>
        <th>Song</th>
        <th>The Show</th>
        <th>MBC Show Champion</th>
        <th>M Net Countdown</th>
        <th>KBS Music Bank</th>
        <th>MBC Show Music Core</th>
        <th>SBS Inkigayo</th>
        <th>Total Win</th>
      </tr>
    </thead>
    
      <tbody>
         <tr>
            <td>TT</td>
            <td>1</td>
            <td>1</td>
            <td>2</td>
            <td>6</td>
            <td>0</td>
            <td>3</td>
            <td>13</td>                        
        </tr> 
        <tr>
            <td>Signal</td>
            <td>0</td>
            <td>2</td>
            <td>2</td>
            <td>3</td>
            <td>2</td>
            <td>3</td>
            <td>12</td>
        </tr>
        <tr>
            <td>Cheer Up</td>
            <td>0</td>
            <td>0</td>
            <td>3</td>
            <td>5</td>
            <td>0</td>
            <td>3</td>
            <td>11</td>
        </tr>
        <tr>
            <td>DTNA</td>
            <td>0</td>
            <td>1</td>
            <td>1</td>
            <td>2</td>
            <td>3</td>
            <td>3</td>
            <td>10</td>
        </tr>
        <tr>
            <td>Knock Knock</td>
            <td>1</td>
            <td>1</td>
            <td>2</td>
            <td>2</td>
            <td>0</td>
            <td>3</td>
            <td>9</td>
        </tr>
      </tbody>

<tfoot>
      <tr>
        <td colspan="8">Song of the Year is TT</td>
      </tr>
    </tfoot>
  </table>
</body>
</html>
